version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: zomitron_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: zomitron
      MONGO_INITDB_ROOT_PASSWORD: zomitron_secret
      MONGO_INITDB_DATABASE: zomitron
    volumes:
      - mongo_data:/data/db
    networks:
      - zomitron_network

  redis:
    image: redis:7-alpine
    container_name: zomitron_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - zomitron_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zomitron_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://zomitron:zomitron_secret@mongodb:27017/zomitron?authSource=admin
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - zomitron_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zomitron_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - zomitron_network

volumes:
  mongo_data:

networks:
  zomitron_network:
    driver: bridge
